<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Lagos Chamber of Commerce | Directory</title>

    <meta name="description" content="Discover and support local businesses in Lagos through the Lagos Chamber of Commerce business directory.">
    <meta name="author" content="Afolabi Eniola">

    <!-- Open Graph -->
    <meta property="og:title" content="Lagos Chamber of Commerce">
    <meta property="og:description" content="Find and support businesses in Lagos.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://prolificate.github.io/wdd231/chamber/directory.html">
    <meta property="og:image" content="images/business.webp">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="styles/copy1.css">
    <link rel="stylesheet" href="styles/copy2.css">

    <!-- JavaScript -->
    <script src="scripts/copy1.js" defer></script>
    <script src="scripts/copy2.js" defer></script>
</head>

<body>

<header>

    <div class="header">

        <div class="logo">

            <img src="images/business.webp"
                alt="Lagos Chamber of Commerce Logo"
                width="75"
                height="75">

            <div class="top">
                <h1 class="five">Lagos</h1>
                <p>Chamber of Commerce</p>
            </div>

        </div>

        <nav>

            <a href="index.html">Home</a>
            <a href="directory.html" class="active">Directory</a>
            <a href="discover.html">Discover</a>
            <a href="#">Join</a>
            <a href="#">About</a>
            <a href="#">Podcast</a>
            <a href="#">Events</a>

        </nav>

        <div class="nav-icons">

            <button id="darkMode" aria-label="Toggle Dark Mode">
                <i class="fa-solid fa-moon"></i>
            </button>

            <button id="menuBtn" aria-label="Open Navigation Menu">
                <i class="fa-solid fa-bars"></i>
            </button>

        </div>

    </div>

</header>

<main>

    <section class="hero">

        <img
            src="images/bridge.webp"
            alt="Third Mainland Bridge in Lagos"
            width="1200"
            height="500">

        <div class="overlay">

            <h2>Support Local Businesses</h2>

            <p>Find trusted businesses across Lagos.</p>

            <button>Browse Directory</button>

        </div>

    </section>

    <section>

        <h2>Business Directory</h2>

        <div class="flex">

            <button id="grid" aria-label="Grid View">
                <i class="fa-solid fa-grip"></i>
                <span>Grid</span>
            </button>

            <button id="list" aria-label="List View">
                <i class="fa-solid fa-list"></i>
                <span>List</span>
            </button>

        </div>

    </section>

    <section id="members" class="grid">

        <!-- JavaScript loads members here -->

    </section>

</main>

<footer>

    <div class="logo">

        <img
            src="images/business.webp"
            alt="Lagos Chamber Logo"
            width="50"
            height="50">

        <div class="top">

            <h3>Lagos</h3>

            <p>Chamber of Commerce</p>

        </div>

    </div>

    <div class="buttom">

        <p>Follow Us</p>

        <div class="socials">

            <a href="https://linkedin.com" target="_blank">
                <i class="fa-brands fa-linkedin"></i>
            </a>

            <a href="https://github.com" target="_blank">
                <i class="fa-brands fa-github"></i>
            </a>

            <a href="https://x.com" target="_blank">
                <i class="fa-brands fa-x-twitter"></i>
            </a>

        </div>

    </div>

    <div class="border"></div>

    <div class="date">

        <p>WDD 231 Chamber Project</p>

        <p>Eniola Afolabi</p>

        <p>&copy; <span id="year"></span> Nigeria</p>

        <p>Last Modified: <span id="lastModified"></span></p>

    </div>

</footer>
